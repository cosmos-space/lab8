<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Profile - Eshop</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="brand"><span class="star">Eshop</span></a>
            <ul id="nav-links">
                <li>
                    <a href="index.html" class="nav-icon-link" title="Shop">
                        <img src="assets/store.png" alt="Shop">
                    </a>
                </li>
                <li id="profile-link" style="display:none;">
                    <a href="profile.html" class="nav-icon-link" title="Profile">
                        <img src="assets/user.png" alt="Profile">
                        <span id="nav-username" class="nav-username"></span>
                    </a>
                </li>
                <li id="admin-link" style="display:none;">
                    <a href="admin.html" class="nav-icon-link" title="Admin">
                        <img src="assets/admin-icon.png" alt="Admin">
                    </a>
                </li>
                <li id="auth-link"><a href="login.html">Login</a></li>
                <li id="logout-link" style="display:none;"><button id="logout-btn" type="button">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>Your Profile</h1>

        <section class="form-card" id="profile-summary">
            <h2>Account</h2>
            <p><strong>Username:</strong> <span id="profile-username"></span></p>
            <p><strong>Email:</strong> <span id="profile-email"></span></p>
            <p><strong>Role:</strong> <span id="profile-role"></span></p>
        </section>

        <section class="table-card">
            <h2>Order History</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="order-table-body"></tbody>
            </table>
        </section>

        <section class="form-card">
            <h2>Edit Profile</h2>
            <form id="profile-update-form">
                <label for="profile-new-username">New username</label>
                <input id="profile-new-username" name="username" type="text" placeholder="Leave blank to keep current">

                <label for="profile-new-password">New password</label>
                <input id="profile-new-password" name="password" type="password" placeholder="Leave blank to keep current">

                <button type="submit">Save changes</button>
            </form>
        </section>
    </main>

    <!-- Global modal -->
    <div id="global-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <h3></h3>
            <p></p>
            <button type="button">OK</button>
        </div>
    </div>

    <script src="js/api/api.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/pages/auth.js"></script>
    <script src="js/pages/profile.js"></script>
</body>
</html>
