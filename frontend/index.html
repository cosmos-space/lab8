<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STARSHOP Eshop Catalog</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="brand"><span class="star">Eshop</span></a>
            <ul id="nav-links">
                <li>
                    <a href="index.html" class="nav-icon-link" title="Shop">
                        <img src="assets/store.png" alt="Shop">
                    </a>
                </li>
                <li>
                    <a href="cart.html" class="nav-icon-link" title="Cart">
                        <img src="assets/trolley.png" alt="Cart">
                        <span id="cart-count" class="nav-cart-count">0</span>
                    </a>
                </li>
                <li id="profile-link" style="display:none;">
                    <a href="profile.html" class="nav-icon-link" title="Profile">
                        <img src="assets/user.png" alt="Profile">
                    </a>
                </li>
                <li id="admin-link" style="display:none;">
                    <a href="admin.html" class="nav-icon-link" title="Admin">
                        <img src="assets/admin-icon.png" alt="Admin">
                    </a>
                </li>
                <li id="auth-link"><a href="login.html">Login</a></li>
                <li id="logout-link" style="display:none;"><button id="logout-btn" type="button">Logout</button></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <h1>Our Products</h1>

        <form id="product-filters" class="form-card">
            <div class="search-main-row">
                <div class="search-main-input">
                    <input id="filter-search" name="search" type="text" placeholder="Search products">
                </div>
                <button type="submit" class="search-main-button" title="Search">
                    <img src="assets/search-interface-symbol.png" alt="Search">
                </button>
                <button type="button" id="search-advanced-toggle" class="search-advanced-toggle">
                    More options
                </button>
            </div>

            <div id="search-advanced" class="search-advanced hidden">
                <div>
                    <label for="filter-field">Search in</label>
                    <select id="filter-field" name="field">
                        <option value="all">All</option>
                        <option value="name">Name only</option>
                        <option value="category">Category only</option>
                    </select>
                </div>

                <div>
                    <label for="filter-sort">Sort by</label>
                    <select id="filter-sort" name="sort">
                        <option value="name">Name</option>
                        <option value="date">Date</option>
                        <option value="price">Price</option>
                    </select>
                </div>

                <div>
                    <label for="filter-sort-dir">Direction</label>
                    <select id="filter-sort-dir" name="sortDir">
                        <option value="asc">Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                </div>
            </div>
        </form>

        <div id="product-grid" class="grid-container">
            <!-- Products will be injected here via JavaScript -->
        </div>
    </main>

    <!-- Global modal -->
    <div id="global-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <h3></h3>
            <p></p>
            <button type="button">OK</button>
        </div>
    </div>

    <script src="js/api/api.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/pages/auth.js"></script>
    <script src="js/pages/cart.js"></script>
    <script src="js/pages/shop.js"></script>
</body>
</html>
