<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STARSHOP Eshop - Your Cart</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="brand"><span class="star">Eshop</span></a>
            <ul id="nav-links">
                <li>
                    <a href="index.html" class="nav-icon-link" title="Shop">
                        <img src="assets/store.png" alt="Shop">
                    </a>
                </li>
                <li>
                    <a href="cart.html" class="nav-icon-link" title="Cart">
                        <img src="assets/trolley.png" alt="Cart">
                        <span id="cart-count" class="nav-cart-count">0</span>
                    </a>
                </li>
                <li id="profile-link" style="display:none;">
                    <a href="profile.html" class="nav-icon-link" title="Profile">
                        <img src="assets/user.png" alt="Profile">
                    </a>
                </li>
                <li id="admin-link" style="display:none;">
                    <a href="admin.html" class="nav-icon-link" title="Admin">
                        <img src="assets/admin-icon.png" alt="Admin">
                    </a>
                </li>
                <!-- No auth-link (Login) on cart page -->
                <li id="logout-link" style="display:none;"><button id="logout-btn" type="button">Logout</button></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <h1>Your Cart</h1>
        <div id="cart-items" class="cart-list"></div>
        <div id="empty-cart-message" class="empty-message">Your cart is empty.</div>
        <div class="cart-footer">
            <span>Total: <strong id="cart-total">$0.00</strong></span>
            <button id="checkout-button">Checkout</button>
        </div>
    </main>

    <!-- Global modal -->
    <div id="global-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <h3></h3>
            <p></p>
            <button type="button">OK</button>
        </div>
    </div>

    <script src="js/api/api.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/pages/cart.js"></script>
</body>
</html>
