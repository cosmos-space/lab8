<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - E-Shop</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="container">
        <h1>Admin Dashboard</h1>
        <section class="form-card">
            <h2>Register User</h2>
            <form id="admin-user-form">
                <label for="admin-user-username">Username</label>
                <input id="admin-user-username" name="username" type="text" required>

                <label for="admin-user-email">Email</label>
                <input id="admin-user-email" name="email" type="email" required>

                <label for="admin-user-password">Password</label>
                <input id="admin-user-password" name="password" type="password" required>

                <label for="admin-user-role">Role</label>
                <select id="admin-user-role" name="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>

                <button type="submit">Create User</button>
            </form>
        </section>

        <section class="form-card">
            <h2>Add Product</h2>
            <form id="product-form">
                <label for="product-name">Name</label>
                <input id="product-name" name="name" type="text" required>

                <label for="product-price">Price</label>
                <input id="product-price" name="price" type="number" step="0.01" required>

                <label for="product-description">Description</label>
                <textarea id="product-description" name="description"></textarea>

                <label for="product-stock">Stock Quantity</label>
                <input id="product-stock" name="stock_quantity" type="number" min="0" value="0">

                <label for="product-image">Image</label>
                <input id="product-image" name="image" type="file" accept="image/*">

                <button type="submit">Add Product</button>
            </form>
        </section>

        <section class="table-card">
            <h2>Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
        </section>

        <section class="table-card">
            <h2>Products</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="product-table-body"></tbody>
            </table>
        </section>

        <section class="table-card">
            <h2>Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Total</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="order-table-body"></tbody>
            </table>
        </section>
    </main>

    <script src="js/api/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
